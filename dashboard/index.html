<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UpClose | Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="/dashboard/supabase-config.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

:root{
  --bg:#eef1f8;--s1:#ffffff;--s2:#ffffff;--s3:#f2f4f9;
  --acc:#3b5bfd;--acc-d:rgba(59,91,253,0.08);--acc-g:rgba(59,91,253,0.05);
  --tx:#14161f;--tx2:#5b6070;--tx3:#9297a5;
  --bd:#e5e7f0;--bd2:#d3d6e4;
  --gr:#16a34a;--gr-d:rgba(22,163,74,0.1);
  --re:#dc2626;--re-d:rgba(220,38,38,0.09);
  --shadow-card:0 1px 2px rgba(20,22,40,0.04),0 20px 48px -12px rgba(20,22,40,0.18);
  --ease:cubic-bezier(.16,.84,.32,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;-webkit-font-smoothing:antialiased}


.icon{display:inline-block;flex-shrink:0;line-height:0}
.icon svg{display:block;width:18px;height:18px}
.icon.sm svg{width:16px;height:16px}
.icon.lg svg{width:22px;height:22px}
::selection{background:rgba(59,91,253,0.18);color:var(--tx)}


#login-page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 15% 8%,rgba(59,91,253,0.10),transparent 45%),
    radial-gradient(circle at 88% 92%,rgba(59,91,253,0.07),transparent 45%),
    var(--bg);
  position:relative;
  padding:32px 20px;
}

.login-wrap{
  position:relative;
  z-index:10;
  width:100%;
  max-width:376px;
}

.login-logo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:11px;
  margin-bottom:28px;
}
.login-logo-mark{
  width:38px;height:38px;
  border-radius:10px;
  background:linear-gradient(160deg,#1b1d27,#0b0c12);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 6px 16px rgba(11,12,18,0.28);
}
.login-logo-mark .icon{color:#fff}
.login-logo-name{font-size:18px;font-weight:800;color:var(--tx);letter-spacing:-0.03em;line-height:1.15}
.login-logo-tag{font-size:9.5px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--tx3)}

.login-card{
  background:var(--s1);
  border:1px solid var(--bd);
  border-radius:16px;
  padding:8px 28px 26px;
  box-shadow:var(--shadow-card);
  position:relative;
  overflow:hidden;
}
.login-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--acc),#8fa4ff);
}
.login-card-title{font-size:19px;font-weight:700;color:var(--tx);margin:24px 0 4px;letter-spacing:-0.02em}
.login-card-sub{font-size:12.5px;color:var(--tx3);margin-bottom:22px}


.lf-group{margin-bottom:14px}
.lf-label{font-size:10.5px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--tx3);display:block;margin-bottom:6px}
.lf-input-wrap{position:relative;display:flex;align-items:center}
.lf-input{
  width:100%;
  background:var(--s3);
  border:1px solid var(--bd);
  border-radius:9px;
  padding:11px 42px 11px 40px;
  color:var(--tx);
  font-size:13px;
  font-family:'Inter',sans-serif;
  outline:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
  line-height:1.2;
}
.lf-input:focus{border-color:rgba(59,91,253,0.45);box-shadow:0 0 0 3px var(--acc-g);background:#fff}
.lf-input::placeholder{color:var(--tx3)}
.lf-input.err{border-color:rgba(220,38,38,0.4);box-shadow:0 0 0 3px var(--re-d)}
.lf-icon{
  position:absolute;left:0;top:0;bottom:0;
  width:38px;
  display:flex;align-items:center;justify-content:center;
  color:var(--tx3);pointer-events:none;
  overflow:hidden;
}
.lf-toggle{
  position:absolute;right:0;top:0;bottom:0;
  width:38px;
  display:flex;align-items:center;justify-content:center;
  color:var(--tx3);cursor:pointer;
  overflow:hidden;
  transition:color .15s;
}
.lf-toggle:hover{color:var(--tx2)}

.lf-opts{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;margin-top:-2px}
.lf-check{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.lf-check input[type=checkbox]{width:14px;height:14px;accent-color:var(--acc);cursor:pointer}
.lf-check-label{font-size:12px;color:var(--tx2)}
.lf-forgot{font-size:12px;color:var(--acc);text-decoration:none;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;padding:0;font-weight:600;transition:opacity .15s}
.lf-forgot:hover{opacity:0.7;text-decoration:underline}


.lf-error{
  display:none;
  background:var(--re-d);
  border:1px solid rgba(220,38,38,0.2);
  border-radius:9px;
  padding:10px 13px;
  margin-bottom:14px;
  font-size:12px;
  color:var(--re);
  align-items:flex-start;
  gap:8px;
}
.lf-error.visible{display:flex}
.lf-error .icon{flex-shrink:0;margin-top:1px}


.lf-success{
  display:none;
  background:var(--gr-d);
  border:1px solid rgba(22,163,74,0.2);
  border-radius:9px;
  padding:10px 13px;
  margin-bottom:14px;
  font-size:12px;
  color:var(--gr);
  align-items:flex-start;
  gap:8px;
}
.lf-success.show{display:flex}
.lf-success .icon{flex-shrink:0;margin-top:1px}


.lf-submit{
  width:100%;
  background:var(--tx);
  color:#fff;
  font-size:13px;
  font-weight:700;
  padding:12px;
  border-radius:9px;
  border:none;
  cursor:pointer;
  font-family:'Inter',sans-serif;
  letter-spacing:0.01em;
  transition:all .2s var(--ease);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  box-shadow:0 4px 12px rgba(20,22,31,0.18);
}
.lf-submit .icon{flex-shrink:0}
.lf-submit:hover:not(:disabled){background:var(--acc);transform:translateY(-1px);box-shadow:0 10px 22px rgba(59,91,253,0.28)}
.lf-submit:active{transform:translateY(0)}
.lf-submit:disabled{opacity:0.55;cursor:not-allowed;transform:none;box-shadow:none}


@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 0.8s linear infinite;display:inline-block}


.fp-back{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx3);cursor:pointer;margin:22px 0 16px;padding:4px 0;background:none;border:none;font-family:'Inter',sans-serif;transition:color .15s}
.fp-back:hover{color:var(--tx)}
.fp-back .icon{flex-shrink:0}


.login-footer{text-align:center;margin-top:22px;font-size:11px;color:var(--tx3)}
.login-footer a{color:var(--acc);text-decoration:none}


.auth-view{display:none}.auth-view.active{display:block}


#authLoader{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
  transition:opacity .3s;
}
#authLoader.fade{opacity:0;pointer-events:none}
.loader-logo{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.loader-logo .icon svg{width:26px;height:26px}
.loader-logo .icon{color:var(--tx)}
.loader-logo span{font-size:18px;font-weight:700;color:var(--tx);letter-spacing:-0.03em}
.loader-bar{width:120px;height:2px;background:var(--bd);border-radius:2px;overflow:hidden}
.loader-bar-fill{height:100%;background:var(--acc);border-radius:2px;animation:loaderPulse 1.2s ease-in-out infinite}
@keyframes loaderPulse{0%,100%{width:20%}50%{width:80%}}
</style>
</head>
<body>


<div id="authLoader">
  <div class="loader-logo">
    <span class="icon lg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg></span>
    <span>UpClose</span>
  </div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  <div style="font-size:11px;color:var(--tx3);letter-spacing:0.05em">Checking session…</div>
</div>


<div id="login-page" style="display:none">
  <div class="login-wrap">


    <div class="login-logo">
      <div class="login-logo-mark"><span class="icon lg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg></span></div>
      <div>
        <div class="login-logo-name">UpClose</div>
        <div class="login-logo-tag">Revenue Operating System</div>
      </div>
    </div>

    <div class="login-card">


      <div class="auth-view active" id="view-signin">
        <div class="login-card-title">Welcome back</div>
        <div class="login-card-sub">Sign in to your workspace</div>

        <div class="lf-error hidden" id="signin-error">
          <span class="icon sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span>
          <span id="signin-error-msg">Invalid credentials. Please try again.</span>
        </div>

        <div class="lf-group">
          <label class="lf-label" for="signin-email">Email address</label>
          <div class="lf-input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/></svg></span>
            <input class="lf-input" id="signin-email" type="email" placeholder="you@company.com"
              autocomplete="email" autocapitalize="off" spellcheck="false"/>
          </div>
        </div>

        <div class="lf-group">
          <label class="lf-label" for="signin-password">Password</label>
          <div class="lf-input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input class="lf-input" id="signin-password" type="password" placeholder="Your password"
              autocomplete="current-password"/>
            <span class="icon sm lf-toggle" id="togglePwd" onclick="togglePassword('signin-password','togglePwd')">
              <svg data-eye="on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg data-eye="off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.53 13.53 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
            </span>
          </div>
        </div>

        <div class="lf-opts">
          <label class="lf-check">
            <input type="checkbox" id="rememberMe" checked/>
            <span class="lf-check-label">Remember me</span>
          </label>
          <button class="lf-forgot" onclick="showView('view-forgot')">Forgot password?</button>
        </div>

        <button class="lf-submit" id="signin-btn" onclick="handleSignIn()">
          <span class="icon sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg></span>
          Sign in
        </button>
      </div>


      <div class="auth-view" id="view-forgot">
        <button class="fp-back" onclick="showView('view-signin')">
          <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></span> Back to sign in
        </button>
        <div class="login-card-title">Reset password</div>
        <div class="login-card-sub">Enter your email and we'll send a reset link</div>

        <div class="lf-error hidden" id="forgot-error">
          <span class="icon sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span>
          <span id="forgot-error-msg">Something went wrong.</span>
        </div>
        <div class="lf-success" id="forgot-success">
          <span class="icon sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="16 9 10.5 15 8 12.5"/></svg></span>
          <span>Reset link sent! Check your inbox.</span>
        </div>

        <div class="lf-group">
          <label class="lf-label" for="forgot-email">Email address</label>
          <div class="lf-input-wrap">
            <span class="icon sm lf-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/></svg></span>
            <input class="lf-input" id="forgot-email" type="email" placeholder="you@company.com"
              autocomplete="email" autocapitalize="off"/>
          </div>
        </div>

        <button class="lf-submit" id="forgot-btn" onclick="handleForgotPassword()">
          <span class="icon sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></span>
          Send reset link
        </button>
      </div>

    </div>

    <div class="login-footer">
      UpClose · Revenue Operating System · v2.0
    </div>
  </div>
</div>

<script>
'use strict';


const SUPABASE_URL      = window.SUPABASE_URL      || '';
const SUPABASE_ANON_KEY  = window.SUPABASE_ANON_KEY  || '';

if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
  console.error('[UpClose Auth] Missing Supabase credentials. Edit supabase-config.js first.');
}

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
  }
});


async function boot() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {

      window.location.replace('dashboard.html');
      return;
    }
  } catch (e) {
    console.error('Session check failed:', e);
  }

  hideLoader();
}

function hideLoader() {
  const loader = document.getElementById('authLoader');
  loader.classList.add('fade');
  setTimeout(() => {
    loader.style.display = 'none';
    document.getElementById('login-page').style.display = 'flex';
  }, 320);
}


function showView(id) {
  document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  clearErrors();
}

function clearErrors() {
  document.querySelectorAll('.lf-error').forEach(e => e.classList.remove('visible'));
  document.querySelectorAll('.lf-input').forEach(i => i.classList.remove('err'));
  document.querySelectorAll('.lf-success').forEach(s => s.classList.remove('show'));
}

function showError(container, msg) {
  const el = document.getElementById(container);
  if (!el) return;
  
  const msgEl = document.getElementById(container + '-msg');
  if (msgEl && msg) msgEl.textContent = msg;
  el.classList.add('visible');
}


function togglePassword(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon  = document.getElementById(iconId);
  const eyeOn  = icon.querySelector('[data-eye="on"]');
  const eyeOff = icon.querySelector('[data-eye="off"]');
  if (input.type === 'password') {
    input.type = 'text';
    eyeOn.style.display = 'none';
    eyeOff.style.display = 'block';
  } else {
    input.type = 'password';
    eyeOn.style.display = 'block';
    eyeOff.style.display = 'none';
  }
}


const SVG_ICONS = {
  login: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>',
  send: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>',
  sync: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>',
};

function setLoading(btnId, loading, label, icon) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  if (loading) {
    btn.innerHTML = `<span class="icon sm spin">${SVG_ICONS.sync}</span> Signing in…`;
  } else {
    btn.innerHTML = `<span class="icon sm">${SVG_ICONS[icon] || ''}</span> ${label}`;
  }
}


async function handleSignIn() {
  clearErrors();
  const email    = document.getElementById('signin-email').value.trim();
  const password = document.getElementById('signin-password').value;
  const remember = document.getElementById('rememberMe').checked;


  if (!email) {
    document.getElementById('signin-email').classList.add('err');
    showError('signin-error', 'Please enter your email address.');
    return;
  }
  if (!password) {
    document.getElementById('signin-password').classList.add('err');
    showError('signin-error', 'Please enter your password.');
    return;
  }

  setLoading('signin-btn', true);


  if (!remember) {
    window.addEventListener('beforeunload', () => {

      sb.auth.signOut();
    }, { once: true });
  }

  try {
    const { data, error } = await sb.auth.signInWithPassword({
      email,
      password,
    });

    if (error) {
      setLoading('signin-btn', false, 'Sign in', 'login');

      const errMap = {
        'Invalid login credentials': 'Incorrect email or password. Please check and try again.',
        'Email not confirmed': 'Please confirm your email address before signing in.',
        'Too many requests': 'Too many sign-in attempts. Please wait a minute and try again.',
      };
      const msg = errMap[error.message] || error.message || 'Sign in failed. Please try again.';
      showError('signin-error', msg);
      document.getElementById('signin-password').classList.add('err');
      return;
    }

    window.location.replace('dashboard.html');

  } catch (e) {
    setLoading('signin-btn', false, 'Sign in', 'login');
    showError('signin-error', 'Connection error. Check your internet and try again.');
    console.error('SignIn error:', e);
  }
}


async function handleForgotPassword() {
  clearErrors();
  const email = document.getElementById('forgot-email').value.trim();

  if (!email) {
    document.getElementById('forgot-email').classList.add('err');
    showError('forgot-error', 'Please enter your email address.');
    return;
  }

  const btn = document.getElementById('forgot-btn');
  btn.disabled = true;
  btn.innerHTML = `<span class="icon sm spin">${SVG_ICONS.sync}</span> Sending…`;

  try {
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html',
    });

    btn.disabled = false;
    btn.innerHTML = `<span class="icon sm">${SVG_ICONS.send}</span> Send reset link`;

    if (error) {
      showError('forgot-error', error.message || 'Failed to send reset link.');
      return;
    }

    document.getElementById('forgot-success').classList.add('show');
    document.getElementById('forgot-email').value = '';

  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = `<span class="icon sm">${SVG_ICONS.send}</span> Send reset link`;
    showError('forgot-error', 'Connection error. Please try again.');
    console.error('ForgotPassword error:', e);
  }
}


document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const activeView = document.querySelector('.auth-view.active');
    if (!activeView) return;
    if (activeView.id === 'view-signin') handleSignIn();
    if (activeView.id === 'view-forgot') handleForgotPassword();
  }
});


boot();
</script>
</body>
</html>
