<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NXTUP Lead | Set New Password</title>
<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f1117;--s1:#171b23;--s2:#1d222d;
  --acc:#adc6ff;--acc-d:rgba(173,198,255,0.12);
  --tx:#e2e2eb;--tx2:#b8c0d4;--tx3:#8e909a;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.11);
  --gr:#4ade80;--gr-d:rgba(74,222,128,0.1);
  --re:#f87171;--re-d:rgba(248,113,113,0.1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);font-size:14px}
.mat{font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 20;font-size:18px;line-height:1;vertical-align:middle;user-select:none}
.mat.sm{font-size:15px}.mat.lg{font-size:22px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}

/* Page layout */
#page{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);position:relative;overflow:hidden;
}
#page::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(173,198,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(173,198,255,0.03) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridDrift 20s linear infinite;
}
#page::after{
  content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);
  width:600px;height:600px;
  background:radial-gradient(ellipse at center,rgba(173,198,255,0.06) 0%,transparent 70%);
  pointer-events:none;
}
@keyframes gridDrift{0%{background-position:0 0}100%{background-position:60px 60px}}
.wrap{position:relative;z-index:10;width:100%;max-width:420px;padding:0 20px}

/* Logo */
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.logo-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,rgba(173,198,255,0.2),rgba(173,198,255,0.06));border:1px solid rgba(173,198,255,0.25);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(173,198,255,0.1)}
.logo-mark .mat{color:var(--acc);font-size:22px}
.logo-name{font-size:20px;font-weight:700;color:var(--acc);letter-spacing:-0.03em}
.logo-tag{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--tx3);margin-top:-2px}

/* Card */
.card{background:var(--s1);border:1px solid var(--bd2);border-radius:12px;padding:28px 28px 24px;box-shadow:0 32px 64px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.04) inset}
.card-title{font-size:18px;font-weight:700;color:var(--tx);margin-bottom:4px;letter-spacing:-0.02em}
.card-sub{font-size:13px;color:var(--tx3);margin-bottom:22px}

/* Inputs */
.fg{margin-bottom:14px}
.fl{font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--tx3);display:block;margin-bottom:6px}
.iw{position:relative;display:flex;align-items:center}
.fi{width:100%;background:var(--bg);border:1px solid var(--bd2);border-radius:7px;padding:10px 40px 10px 38px;color:var(--tx);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s}
.fi:focus{border-color:rgba(173,198,255,0.4);box-shadow:0 0 0 3px rgba(173,198,255,0.08)}
.fi::placeholder{color:var(--tx3)}
.fi.err{border-color:rgba(248,113,113,0.45)}
.fi-icon{position:absolute;left:11px;color:var(--tx3);pointer-events:none;font-size:16px}
.fi-toggle{position:absolute;right:10px;color:var(--tx3);cursor:pointer;padding:4px;border-radius:4px;font-size:16px;transition:color .15s}
.fi-toggle:hover{color:var(--tx2)}

/* Strength meter */
.strength-wrap{margin-top:8px}
.strength-bars{display:flex;gap:3px;margin-bottom:4px}
.strength-bar{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.08);transition:background .3s}
.strength-bar.weak{background:var(--re)}
.strength-bar.fair{background:var(--am)}
.strength-bar.good{background:var(--acc)}
.strength-bar.strong{background:var(--gr)}
.strength-label{font-size:10px;font-weight:600;letter-spacing:0.05em;color:var(--tx3)}

/* Alert boxes */
.alert{display:none;border-radius:7px;padding:10px 13px;margin-bottom:14px;font-size:12px;align-items:flex-start;gap:8px}
.alert.show{display:flex}
.alert.err{background:var(--re-d);border:1px solid rgba(248,113,113,0.25);color:var(--re)}
.alert.ok{background:var(--gr-d);border:1px solid rgba(74,222,128,0.25);color:var(--gr)}
.alert.info{background:var(--acc-d);border:1px solid rgba(173,198,255,0.2);color:var(--acc)}

/* Button */
.btn{width:100%;background:var(--acc);color:#0a0d14;font-size:13px;font-weight:700;padding:11px;border-radius:7px;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn:hover:not(:disabled){background:#c5d8ff;transform:translateY(-1px);box-shadow:0 6px 20px rgba(173,198,255,0.2)}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}

/* Footer */
.foot{text-align:center;margin-top:20px;font-size:11px;color:var(--tx3)}
.foot a{color:var(--acc);text-decoration:none;cursor:pointer}
.foot a:hover{text-decoration:underline}
</style>
</head>
<body>
<div id="page">
  <div class="wrap">

    <div class="logo">
      <div class="logo-mark"><span class="mat lg">bolt</span></div>
      <div>
        <div class="logo-name">NXTUP Lead</div>
        <div class="logo-tag">Revenue Operating System</div>
      </div>
    </div>

    <div class="card" id="mainCard">
      <div class="card-title" id="cardTitle">Set new password</div>
      <div class="card-sub" id="cardSub">Choose a strong password for your account</div>

      <div class="alert err" id="errorAlert">
        <span class="mat sm">error</span>
        <span id="errorMsg">Something went wrong.</span>
      </div>
      <div class="alert ok" id="successAlert">
        <span class="mat sm">check_circle</span>
        <span>Password updated! Redirecting to sign in…</span>
      </div>
      <div class="alert info" id="infoAlert">
        <span class="mat sm">info</span>
        <span id="infoMsg">Loading…</span>
      </div>

      <div id="formSection">
        <div class="fg">
          <label class="fl" for="newPwd">New Password</label>
          <div class="iw">
            <span class="mat sm fi-icon">lock</span>
            <input class="fi" id="newPwd" type="password" placeholder="At least 8 characters" oninput="checkStrength(this.value)"/>
            <span class="mat sm fi-toggle" id="toggleNew" onclick="togglePwd('newPwd','toggleNew')">visibility</span>
          </div>
          <div class="strength-wrap">
            <div class="strength-bars">
              <div class="strength-bar" id="sb1"></div>
              <div class="strength-bar" id="sb2"></div>
              <div class="strength-bar" id="sb3"></div>
              <div class="strength-bar" id="sb4"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
          </div>
        </div>

        <div class="fg">
          <label class="fl" for="confirmPwd">Confirm Password</label>
          <div class="iw">
            <span class="mat sm fi-icon">lock_reset</span>
            <input class="fi" id="confirmPwd" type="password" placeholder="Repeat your new password"/>
            <span class="mat sm fi-toggle" id="toggleConfirm" onclick="togglePwd('confirmPwd','toggleConfirm')">visibility</span>
          </div>
        </div>

        <button class="btn" id="submitBtn" onclick="handleReset()">
          <span class="mat sm">lock_reset</span>
          Update password
        </button>
      </div>
    </div>

    <div class="foot">
      <a onclick="window.location.replace('index.html')">← Back to sign in</a>
    </div>
  </div>
</div>

<script>
'use strict';

const SUPABASE_URL      = window.SUPABASE_URL      || '';
const SUPABASE_ANON_KEY  = window.SUPABASE_ANON_KEY  || '';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
});

/* ── On load: Supabase parses the #access_token from the reset URL ── */
window.addEventListener('load', async () => {
  // detectSessionInUrl: true means Supabase will automatically exchange the
  // token from the URL hash. We just need to check if a session exists.
  const { data: { session }, error } = await supabase.auth.getSession();

  if (error || !session) {
    showAlert('errorAlert', 'This reset link is invalid or has expired. Please request a new one.');
    document.getElementById('formSection').style.display = 'none';
    return;
  }

  // Good — session established from the reset token
  // Form is shown by default
});

/* ── Password strength ── */
function checkStrength(pwd) {
  const bars = [1,2,3,4].map(i => document.getElementById('sb'+i));
  const label = document.getElementById('strengthLabel');
  bars.forEach(b => { b.className = 'strength-bar'; });

  if (!pwd) { label.textContent = ''; return; }

  let score = 0;
  if (pwd.length >= 8)  score++;
  if (pwd.length >= 12) score++;
  if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd) && /[^a-zA-Z0-9]/.test(pwd)) score++;

  const levels = [
    { cls: 'weak',   label: 'Weak',   color: 'var(--re)' },
    { cls: 'fair',   label: 'Fair',   color: 'var(--am)' },
    { cls: 'good',   label: 'Good',   color: 'var(--acc)' },
    { cls: 'strong', label: 'Strong', color: 'var(--gr)' },
  ];
  const lvl = levels[Math.max(0, score - 1)];
  for (let i = 0; i < score; i++) bars[i].classList.add(lvl.cls);
  label.textContent = lvl.label;
  label.style.color = lvl.color;
}

function togglePwd(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon  = document.getElementById(iconId);
  input.type  = input.type === 'password' ? 'text' : 'password';
  icon.textContent = input.type === 'password' ? 'visibility' : 'visibility_off';
}

function showAlert(id, msg) {
  ['errorAlert','successAlert','infoAlert'].forEach(a => {
    document.getElementById(a).classList.remove('show');
  });
  const el = document.getElementById(id);
  if (msg && id === 'errorAlert') document.getElementById('errorMsg').textContent = msg;
  if (msg && id === 'infoMsg')    document.getElementById('infoMsg').textContent  = msg;
  el.classList.add('show');
}

/* ── Submit ── */
async function handleReset() {
  ['errorAlert','successAlert','infoAlert'].forEach(a => document.getElementById(a).classList.remove('show'));

  const pwd     = document.getElementById('newPwd').value;
  const confirm = document.getElementById('confirmPwd').value;

  document.getElementById('newPwd').classList.remove('err');
  document.getElementById('confirmPwd').classList.remove('err');

  if (pwd.length < 8) {
    document.getElementById('newPwd').classList.add('err');
    showAlert('errorAlert', 'Password must be at least 8 characters.');
    return;
  }
  if (pwd !== confirm) {
    document.getElementById('confirmPwd').classList.add('err');
    showAlert('errorAlert', 'Passwords do not match.');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="mat sm spin">sync</span> Updating…';

  try {
    const { error } = await supabase.auth.updateUser({ password: pwd });

    if (error) {
      btn.disabled = false;
      btn.innerHTML = '<span class="mat sm">lock_reset</span> Update password';
      showAlert('errorAlert', error.message || 'Failed to update password. Try requesting a new link.');
      return;
    }

    // Success
    showAlert('successAlert');
    document.getElementById('formSection').style.display = 'none';

    // Sign out and redirect to login after 2.5s
    await supabase.auth.signOut();
    setTimeout(() => window.location.replace('index.html'), 2500);

  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = '<span class="mat sm">lock_reset</span> Update password';
    showAlert('errorAlert', 'Connection error. Please try again.');
  }
}

/* Enter key */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleReset();
});
</script>
</body>
</html>
